version: '3.8'

services:
  # MySQL 数据库服务
  mysql:
    image: mysql:8.0
    container_name: project-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: project_management
      MYSQL_USER: pm_user
      MYSQL_PASSWORD: pm_pass123
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - project-network
    restart: unless-stopped

  # Redis 缓存服务
  redis:
    image: redis:7-alpine
    container_name: project-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - project-network
    restart: unless-stopped

  # 后端应用服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: project-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/project_management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: pm_user
      SPRING_DATASOURCE_PASSWORD: pm_pass123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    networks:
      - project-network
    restart: unless-stopped

  # 前端应用服务（集成Nginx）
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: project-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - project-network
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:

networks:
  project-network:
    driver: bridge